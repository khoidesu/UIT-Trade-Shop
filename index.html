<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UIT Exchange</title>
    <link rel="icon" type="image/x-icon" href="img/uitfavicon.ico" />
    <meta
      name="description"
      content="Trang web trao đổi mua bán giữa các sinh viên UIT"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,1"
    />
    <link rel="stylesheet" href="./styles.css?v=2" />
    <link rel="stylesheet" href="./chat.css?v=6" />
  </head>

  <body>
    <div id="app">
      <header class="topbar">
        <div class="container topbar__row">
          <a
            class="brand"
            href="#/"
            style="display: flex; align-items: center"
            onclick="
              if (location.hash === '#/' || location.hash === '') {
                location.reload();
              }
            "
          >
            <img
              id="brandLogo"
              src="./img/logo.png"
              alt="logo"
              style="height: 40px; display: block"
            />
          </a>

          <form id="searchForm" class="search" autocomplete="off">
            <input
              id="searchInput"
              class="search__input"
              type="search"
              placeholder="Tìm kiếm sản phẩm"
              aria-label="Tìm kiếm sản phẩm"
            />
            <button class="search__btn" type="submit">Tìm kiếm</button>
          </form>

          <div class="topbar__actions">
            <button
              id="searchToggleButton"
              class="iconbtn iconbtn--mobileOnly"
              type="button"
              aria-label="Mở tìm kiếm"
              aria-expanded="false"
            >
              <span class="material-symbols-outlined"> search </span>
              <span class="iconbtn__label">Tìm</span>
            </button>
            <button
              id="messagesButton"
              class="iconbtn iconbtn--mobileOnly"
              type="button"
              aria-label="Mở chat"
              hidden
            >
              <span class="material-symbols-outlined"> chat </span>
              <span class="iconbtn__label">Chat</span>
            </button>
            <a
              id="addProductButton"
              class="iconbtn"
              href="#/admin"
              aria-label="Thêm sản phẩm"
              hidden
            >
              <span class="material-symbols-outlined"> add_circle </span>
              <span class="iconbtn__label">Thêm</span>
            </a>
            <!-- Removed messagesButton from top level, moved into dropdown -->
            <button
              id="cartButton"
              class="iconbtn"
              type="button"
              aria-label="Open cart"
              hidden
            >
              <span class="material-symbols-outlined"> shopping_cart </span>
              <span class="iconbtn__label">Giỏ</span>
              <span id="cartCountBadge" class="badge badge--pill" hidden
                >0</span
              >
            </button>
            <div class="accountMenu">
              <button
                id="accountButton"
                class="iconbtn"
                type="button"
                aria-label="Open account menu"
                style="padding: 4px; border-radius: 50%"
              >
                <img
                  id="navAvatar"
                  src=""
                  alt="Avatar"
                  style="
                    width: 32px;
                    height: 32px;
                    border-radius: 50%;
                    object-fit: cover;
                    display: none;
                  "
                />
                <span
                  id="navAvatarFallback"
                  style="font-size: 24px; line-height: 32px"
                  >👤</span
                >
                <span id="authStatus" hidden>Khách</span>
              </button>
              <div id="accountDropdown" class="accountMenu__dropdown" hidden>
                <div
                  id="accountProfileInfo"
                  style="
                    padding: 12px 16px;
                    border-bottom: 1px solid var(--border-color);
                    display: none;
                    flex-direction: column;
                    gap: 4px;
                  "
                >
                  <strong
                    id="accountProfileName"
                    style="font-size: 15px"
                  ></strong>
                  <span
                    id="accountProfileMssv"
                    style="font-size: 13px; color: var(--muted-color)"
                  ></span>
                </div>
                <a
                  id="accountLoginLink"
                  class="accountMenu__item"
                  href="#/login"
                  >Đăng nhập</a
                >
                <a
                  id="accountRegisterLink"
                  class="accountMenu__item"
                  href="#/register"
                  >Đăng ký</a
                >
                <a
                  id="accountViewLink"
                  class="accountMenu__item"
                  href="#/my-account"
                  hidden
                  >Xem tài khoản của tôi</a
                >
                <a
                  id="accountPostingGuideLink"
                  class="accountMenu__item"
                  href="#/posting-guide"
                  hidden
                  >Hướng dẫn đăng bài</a
                >
                <a
                  id="accountOrdersLink"
                  class="accountMenu__item"
                  href="#/orders"
                  hidden
                  >Đơn hàng</a
                >
                <a
                  id="accountReturnsLink"
                  class="accountMenu__item"
                  href="#/returns"
                  hidden
                  >Hoàn trả</a
                >
                <a
                  id="accountAdminVerifyLink"
                  class="accountMenu__item"
                  href="#/verify-student"
                  hidden
                  >Xác minh tài khoản</a
                >
                <a
                  id="accountManageAccountsLink"
                  class="accountMenu__item"
                  href="#/manage-accounts"
                  hidden
                  >Quản lý tài khoản</a
                >
                <a
                  id="accountDiscountCodesLink"
                  class="accountMenu__item"
                  href="#/discount-codes"
                  hidden
                  >Mã giảm giá</a
                >
                <a
                  id="accountMessagesLink"
                  class="accountMenu__item"
                  href="#/messages"
                  hidden
                  >Hộp thư</a
                >
                <button
                  id="logoutButton"
                  class="accountMenu__item accountMenu__item--btn"
                  type="button"
                  hidden
                >
                  Đăng xuất
                </button>
              </div>
            </div>
          </div>
        </div>
      </header>

      <main class="container main">
        <nav id="categoryBar" class="categories" aria-label="Categories"></nav>
        <section id="view" class="view" aria-live="polite"></section>
      </main>

      <footer class="footer">
        <div class="container footer__row">
          <div class="muted">
            Đồ án kĩ năng nghề nghiệp, chỉ là bản demo không sử dụng như ứng
            dụng thực tiễn.
          </div>
          <div class="muted">© <span id="year"></span> UIT Exchange</div>
        </div>
      </footer>
    </div>

    <aside id="cartDrawer" class="drawer" aria-hidden="true">
      <div class="drawer__backdrop" data-close-drawer></div>
      <div
        class="drawer__panel"
        role="dialog"
        aria-modal="true"
        aria-label="Cart"
      >
        <div class="drawer__header">
          <div class="drawer__title">Giỏ hàng của bạn</div>
          <button
            class="iconbtn"
            type="button"
            data-close-drawer
            aria-label="Đóng giỏ hàng"
          >
            ✕
          </button>
        </div>
        <div id="cartDrawerBody" class="drawer__body"></div>
        <div class="drawer__footer">
          <div class="drawer__total">
            <span class="muted">Tổng tiền:</span>
            <strong id="cartSubtotal">0₫</strong>
          </div>
          <div class="drawer__footerActions">
            <button id="clearCartBtn" class="btn btn--ghost" type="button">
              Xóa
            </button>
            <a id="checkoutBtn" class="btn btn--primary" href="#/checkout"
              >Đi đến thanh toán</a
            >
          </div>
        </div>
      </div>
    </aside>

    <div
      id="toastHost"
      class="toastHost"
      aria-live="polite"
      aria-atomic="true"
    ></div>
    <script>
      window.__UIT_API_BASE__ = "https://uit-exchange.onrender.com";
    </script>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
